name: check

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        leg: [lint, typecheck, unit]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '22.x'
          cache: npm

      - name: Install npm dependencies
        run: npm ci

      - name: Run lint
        if: matrix.leg == 'lint'
        run: npm run lint

      - name: Run typecheck
        if: matrix.leg == 'typecheck'
        run: npm run typecheck

      - name: Run unit tests
        if: matrix.leg == 'unit'
        run: npm run test:unit
