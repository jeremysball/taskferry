                    - generic [ref=f31e960] [cursor=pointer]: Image inpainting
                  - generic [ref=f31e961]: Inpainting lets you regenerate specific parts of an image while keeping the rest intact. This is useful for correcting details, replacing elements, or making creative changes without starting from scratch. It uses a mask to identify the areas to be filled in, where white pixels represent the regions to inpaint, and black pixels indicate the areas to keep intact, i.e. the white pixels are filled based on the input provided in the prompt.
                  - generic [ref=f31e962]:
                    - emphasis [ref=f31e963]:
                      - strong [ref=f31e964]: Note
                    - text: ": This operation is available with Recraft V3, Recraft V3 Vector models only."
