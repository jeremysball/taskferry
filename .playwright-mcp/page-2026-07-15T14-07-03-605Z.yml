                          - cell "string — URL or data URL of the input image" [ref=f31e379]
                        - row [ref=f31e380]:
                          - cell [ref=f31e381]:
                            - code [ref=f31e382]: files
                            - text: (Create style)
                          - cell [ref=f31e383]:
                            - code [ref=f31e384]: image_urls
                          - cell "array of strings — URLs or data URLs of the input images" [ref=f31e385]
                  - generic [ref=f31e386]: All other parameters are identical between the two formats. Use JSON when your image is already hosted somewhere (just send the URL) or when a JSON body fits your client better; use multipart to upload local files directly. The examples below show both variants where applicable.
