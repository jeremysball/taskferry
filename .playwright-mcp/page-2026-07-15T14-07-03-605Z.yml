                      - /url: "#image-outpainting"
                    - generic [ref=f31e1127] [cursor=pointer]: Image outpainting
                  - generic [ref=f31e1128]: Outpainting extends an image beyond its original boundaries by generating new content around it. This is useful for changing the aspect ratio, adding scenery, or zooming out to reveal more of the scene while keeping the original image intact.
                  - generic [ref=f31e1129]:
                    - text: The area to be generated can be specified either by per-side pixel margins via
                    - code [ref=f31e1130]: expand_left
                    - text: ","
                    - code [ref=f31e1131]: expand_right
                    - text: ","
                    - code [ref=f31e1132]: expand_top
                    - text: ","
                    - code [ref=f31e1133]: expand_bottom
                    - text: (which extend the image by the given amount on each side), or by a target
                    - code [ref=f31e1134]: size
                    - text: (which places the source image inside the resulting image of the given dimensions); these two options cannot be used together. After that, it is also possible to specify
                    - code [ref=f31e1135]: zoom_out_percentage
                    - text: ", which scales the source image down relative to the resulting image by the given percentage and can be combined with either option or used on its own. At least one of"
                    - code [ref=f31e1136]: size
                    - text: ","
                    - code [ref=f31e1137]: expand_*
                    - text: ", or"
                    - code [ref=f31e1138]: zoom_out_percentage
                    - text: must be specified.
                  - generic [ref=f31e1139]:
                    - emphasis [ref=f31e1140]:
                      - strong [ref=f31e1141]: Note
                    - text: ": This operation is available with Recraft V3, Recraft V3 Vector models only."
