                        - row [ref=f31e368]:
                          - cell [ref=f31e369]:
                            - code [ref=f31e370]: mask
                          - cell [ref=f31e371]:
                            - code [ref=f31e372]: mask_url
                          - cell "string — URL or data URL of the mask image" [ref=f31e373]
                        - row [ref=f31e374]:
                          - cell [ref=f31e375]:
