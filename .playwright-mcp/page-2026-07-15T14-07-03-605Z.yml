                    - text: We use
                    - link "Bearer" [ref=f31e294] [cursor=pointer]:
                      - /url: https://swagger.io/docs/specification/authentication/bearer-authentication/
                    - text: API tokens for authentication. To access your API key, log in to Recraft and
                    - link "enter your profile" [ref=f31e295] [cursor=pointer]:
                      - /url: https://app.recraft.ai/profile/api
                    - text: ". All requests should include your API key in an Authorization HTTP header as follows:"
