                    - text: ": The bounding box (bbox) is a list of 4 points representing a 4-angled figure (not necessarily a rectangle). Each point specifies its coordinates relative to the layout dimensions, where (0, 0) is the top-left corner, (1, 1) is the bottom-right corner."
                  - generic [ref=f31e2783]:
                    - strong [ref=f31e2784]: Coordinates
                    - text: ": Coordinates are"
