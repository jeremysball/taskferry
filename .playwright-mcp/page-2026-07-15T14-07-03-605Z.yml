                      - generic [ref=f31e322]: client = OpenAI(
                      - generic [ref=f31e323]: base_url='https://external.api.recraft.ai/v1',
                      - generic [ref=f31e324]: api_key=<RECRAFT_API_TOKEN>,
                      - generic [ref=f31e325]: )
                  - generic [ref=f31e326]:
                    - text: Since the Recraft API follows REST principles, you can interact with it using any standard HTTP client such as
                    - code [ref=f31e327]: curl
                    - text: ", as well as your preferred programming language or library."
                  - 'heading "Navigate to header Image inputs: multipart or JSON" [level=2] [ref=f31e328]':
                    - link "Navigate to header" [ref=f31e329] [cursor=pointer]:
                      - /url: "#image-inputs-multipart-or-json"
                    - generic [ref=f31e334] [cursor=pointer]: "Image inputs: multipart or JSON"
                  - generic [ref=f31e335]:
                    - text: Every endpoint that takes an image (or mask) as input accepts the request in
                    - strong [ref=f31e336]: two interchangeable formats
                    - text: ":"
                  - list [ref=f31e337]:
                    - listitem [ref=f31e338]:
                      - strong [ref=f31e339]:
                        - code [ref=f31e340]: multipart/form-data
                      - text: — upload the binary file directly using form fields (
                      - code [ref=f31e341]: image
                      - text: ","
                      - code [ref=f31e342]: mask
                      - text: ","
                      - code [ref=f31e343]: file
                      - text: ", …). This is convenient for local files."
                    - listitem [ref=f31e344]:
                      - strong [ref=f31e345]:
                        - code [ref=f31e346]: application/json
                      - text: — pass the image
                      - emphasis [ref=f31e347]: by reference
                      - text: instead of uploading bytes. Each file field has a JSON counterpart that accepts a
                      - strong [ref=f31e348]: public URL
                      - text: or a
                      - strong [ref=f31e349]:
                        - link "data URL" [ref=f31e350] [cursor=pointer]:
                          - /url: https://developer.mozilla.org/en-US/docs/Web/URI/Schemes/data
                      - text: (a
                      - code [ref=f31e351]: data:image/...;base64,...
                      - text: string).
                  - generic [ref=f31e352]: "The mapping between the multipart file fields and their JSON counterparts:"
                  - region "Scrollable table" [ref=f31e353]:
                    - table [ref=f31e355]:
                      - rowgroup [ref=f31e356]:
                        - row [ref=f31e357]:
